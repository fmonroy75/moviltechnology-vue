<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#shine)"/>

  <!-- Phone body -->
  <rect x="156" y="80" width="200" height="340" rx="28" fill="white" opacity="0.95"/>
  <!-- Screen -->
  <rect x="170" y="110" width="172" height="270" rx="8" fill="#1e40af"/>
  <!-- Home button notch -->
  <rect x="226" y="88" width="60" height="10" rx="5" fill="#bfdbfe"/>
  <!-- Signal bars on screen -->
  <rect x="192" y="180" width="16" height="60" rx="4" fill="#60a5fa" opacity="0.9"/>
  <rect x="216" y="160" width="16" height="80" rx="4" fill="#93c5fd" opacity="0.9"/>
  <rect x="240" y="140" width="16" height="100" rx="4" fill="#bfdbfe" opacity="0.9"/>
  <rect x="264" y="155" width="16" height="85" rx="4" fill="#93c5fd" opacity="0.9"/>
  <rect x="288" y="170" width="16" height="70" rx="4" fill="#60a5fa" opacity="0.9"/>
  <!-- Small wifi arc -->
  <path d="M220 280 Q256 250 292 280" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M234 298 Q256 278 278 298" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
  <circle cx="256" cy="318" r="7" fill="white" opacity="0.95"/>
</svg>
